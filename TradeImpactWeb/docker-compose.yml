version: '3.8'

services:
  tradeimpact-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tradeimpact-web
    ports:
      - "8080:8080"
    environment:
      # Java Options
      - JAVA_OPTS=-Xmx512m -Xms256m
      
      # Server Configuration
      - SERVER_PORT=8080
      
      # Database (H2 file-based)
      - SPRING_DATASOURCE_URL=jdbc:h2:file:/app/data/marketdata
      
      # SDP Configuration (override con .env o qui)
      - PLATFORM_ID=${PLATFORM_ID:-1}
      - IPSP_HOST=${IPSP_HOST:-}
      - IPSP_PORT=${IPSP_PORT:-8800}
      - IPSP_SSL=${IPSP_SSL:-true}
      
      # Data Retention
      - DATABASE_CLEANUP_RETENTION_DAYS=${DATABASE_CLEANUP_RETENTION_DAYS:-30}
      
      # Logging
      - LOGGING_LEVEL_COM_MTS_GATEWAY=${LOG_LEVEL:-INFO}
    
    volumes:
      # Database H2 rimane nel container (NON persistito su host)
      # Se vuoi persistere, decommenta:
      # - ./data:/app/data
      
      # Opzionale: mount logs
      - ./logs:/app/logs
    
    restart: unless-stopped
    
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s
    
    networks:
      - tradeimpact-net

networks:
  tradeimpact-net:
    driver: bridge

volumes:
  data:
  logs:
